name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Classify the branch
  # ─────────────────────────────────────────────
  classify-branch:
    runs-on: ubuntu-latest
    outputs:
      branch_type:           ${{ steps.classify.outputs.branch_type }}
      should_deploy:         ${{ steps.classify.outputs.should_deploy }}
      should_run_full_tests: ${{ steps.classify.outputs.should_run_full_tests }}

    steps:
      - name: Classify Branch
        id: classify
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Classifying branch: $BRANCH"

          BRANCH_TYPE="unknown"
          SHOULD_DEPLOY="false"
          SHOULD_RUN_FULL_TESTS="false"

          case "$BRANCH" in
            main|master)
              BRANCH_TYPE="production"
              SHOULD_DEPLOY="true"
              SHOULD_RUN_FULL_TESTS="true"
              ;;
            develop)
              BRANCH_TYPE="develop"
              SHOULD_DEPLOY="true"
              SHOULD_RUN_FULL_TESTS="true"
              ;;
            release/*)
              BRANCH_TYPE="release"
              SHOULD_DEPLOY="true"
              SHOULD_RUN_FULL_TESTS="true"
              ;;
            hotfix/*)
              BRANCH_TYPE="hotfix"
              SHOULD_DEPLOY="true"
              SHOULD_RUN_FULL_TESTS="true"
              ;;
            feature/*|bugfix/*|chore/*)
              BRANCH_TYPE="feature"
              SHOULD_DEPLOY="false"
              SHOULD_RUN_FULL_TESTS="false"
              ;;
            dependabot/*|renovate/*)
              BRANCH_TYPE="dependency"
              SHOULD_DEPLOY="false"
              SHOULD_RUN_FULL_TESTS="false"
              ;;
            *)
              BRANCH_TYPE="unknown"
              SHOULD_DEPLOY="false"
              SHOULD_RUN_FULL_TESTS="false"
              echo "::warning::Unrecognized branch: $BRANCH — running minimal checks only"
              ;;
          esac

          echo "branch_type=$BRANCH_TYPE"                    >> $GITHUB_OUTPUT
          echo "should_deploy=$SHOULD_DEPLOY"                >> $GITHUB_OUTPUT
          echo "should_run_full_tests=$SHOULD_RUN_FULL_TESTS" >> $GITHUB_OUTPUT

          echo "-------------------------------"
          echo "Branch      : $BRANCH"
          echo "Type        : $BRANCH_TYPE"
          echo "Full Tests  : $SHOULD_RUN_FULL_TESTS"
          echo "Deploy      : $SHOULD_DEPLOY"
          echo "-------------------------------"

  # ─────────────────────────────────────────────
  # JOB 2: Minimal tests — runs on every branch
  # ─────────────────────────────────────────────
  test-minimal:
    needs: classify-branch
    if: needs.classify-branch.outputs.branch_type != 'dependency'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mira
          POSTGRES_PASSWORD: mira
          POSTGRES_DB: mira
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mira -d mira"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      APP_ENV: ci
      APP_NAME: MIRA
      LOG_LEVEL: INFO
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
      POSTGRES_DB: mira

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run minimal tests (no integration)
        working-directory: backend
        run: |
          pytest -m "not integration" --tb=short

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-minimal-${{ github.ref_name }}
          path: |
            backend/test_logs
            backend/test_reports

  # ─────────────────────────────────────────────
  # JOB 3: Full tests — runs on main/master/develop/release/hotfix only
  # ─────────────────────────────────────────────
  test-full:
    needs: classify-branch
    if: needs.classify-branch.outputs.should_run_full_tests == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mira
          POSTGRES_PASSWORD: mira
          POSTGRES_DB: mira
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mira -d mira"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "bash -lc 'wget -qO- http://localhost:7474 || exit 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      APP_ENV: ci
      APP_NAME: MIRA
      LOG_LEVEL: INFO
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
      POSTGRES_DB: mira
      QDRANT_URL: http://localhost:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite
        working-directory: backend
        run: |
          pytest --tb=short --html=test_reports/report.html

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-full-${{ github.ref_name }}
          path: |
            backend/test_logs
            backend/test_reports
