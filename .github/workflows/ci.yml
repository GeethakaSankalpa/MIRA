name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mira
          POSTGRES_PASSWORD: mira
          POSTGRES_DB: mira
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mira -d mira"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "bash -lc 'wget -qO- http://localhost:7474 || exit 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      # App env for tests
      APP_ENV: ci
      APP_NAME: MIRA
      LOG_LEVEL: INFO

      # Neo4j
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

      # Postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
      POSTGRES_DB: mira

      # Qdrant (not required for Phase 1 search if using Postgres embeddings)
      QDRANT_URL: http://localhost:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          pytest

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            backend/test_logs
            backend/test_reports